<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QUANT CURVE — VOL_FIELD_V5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000810;--bg2:#000C18;--bg3:#000A15;
  --c:#00D4E8;--c2:rgba(0,212,232,.12);--c3:rgba(0,212,232,.07);
  --p:#FF2060;--g:#00E898;--r:#FF4060;
  --t1:#D8EEFF;--t2:#507080;--t3:#1A2F3F;
  --bd:rgba(0,212,232,.18);--bd2:rgba(0,212,232,.07)
}
html,body{
  background:var(--bg);
  font-family:'JetBrains Mono',monospace;
  color:var(--t1);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:720px;margin:0 auto;padding:20px 14px 48px}

/* ── TAGLINE ── */
.tagline{text-align:center;margin-bottom:20px}
.tagline h1{
  font-family:'Inter',sans-serif;
  font-size:clamp(15px,3.8vw,24px);
  font-weight:800;letter-spacing:-.02em;line-height:1.25;color:var(--t1)
}
.tagline h1 em{color:var(--c);font-style:normal}

/* ── TERMINAL BOX ── */
.term{
  border:1px solid var(--bd);border-radius:3px;overflow:hidden;background:var(--bg2);
  box-shadow:0 0 0 1px rgba(0,212,232,.04),0 0 50px rgba(0,212,232,.07),
             inset 0 0 100px rgba(0,0,0,.25)
}
.sep{border-bottom:1px solid var(--bd2)}

/* ── HEADER ── */
.t-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:rgba(0,212,232,.025);border-bottom:1px solid var(--bd2)
}
.t-hl{display:flex;align-items:center;gap:10px}
.q-icon{
  width:32px;height:32px;border:1px solid rgba(0,212,232,.35);border-radius:3px;
  background:rgba(0,212,232,.09);display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:var(--c);
  box-shadow:inset 0 0 10px rgba(0,212,232,.12),0 0 8px rgba(0,212,232,.1)
}
.b-name{font-size:11.5px;font-weight:600;letter-spacing:.14em;color:var(--t1)}
.b-ver{font-size:7.5px;letter-spacing:.1em;color:var(--t2);margin-top:1px}
.t-hr{text-align:right}
.t-act{font-size:7.5px;letter-spacing:.12em;color:var(--t2)}
.t-state{
  display:flex;align-items:center;gap:5px;
  font-size:9.5px;font-weight:600;letter-spacing:.1em;color:var(--c);margin-top:2px
}
.dot{
  width:7px;height:7px;border-radius:50%;background:var(--c);
  box-shadow:0 0 8px var(--c),0 0 16px rgba(0,212,232,.4);
  animation:bk 1.1s ease-in-out infinite
}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.2}}

/* ── MESH ── */
.t-mesh{position:relative;background:#000810;border-bottom:1px solid var(--bd2)}
.mesh-top{
  position:absolute;top:7px;left:0;right:0;
  display:flex;justify-content:space-between;
  padding:0 14px;z-index:2;pointer-events:none
}
.mesh-lbl{
  display:flex;align-items:center;gap:7px;
  font-size:8.5px;letter-spacing:.14em;color:var(--c);font-weight:500;
  text-shadow:0 0 12px rgba(0,212,232,.6)
}
.eq{display:inline-flex;align-items:flex-end;gap:2px;height:11px}
.eq span{display:block;width:3px;background:var(--c);border-radius:1px;
  animation:eq .6s ease-in-out infinite alternate;transform-origin:bottom}
.eq span:nth-child(1){height:40%;animation-delay:0s}
.eq span:nth-child(2){height:100%;animation-delay:.18s}
.eq span:nth-child(3){height:60%;animation-delay:.36s}
@keyframes eq{from{transform:scaleY(.25)}to{transform:scaleY(1)}}
.mesh-flux{font-size:8px;letter-spacing:.08em;color:var(--t2)}
.mesh-flux b{color:var(--c);font-weight:400}
#meshC{display:block;width:100%;height:182px}

/* ── CONTROLS ── */
.t-ctrl{padding:9px 14px;border-bottom:1px solid var(--bd2);display:flex;flex-direction:column;gap:8px}
.c-row{display:flex;align-items:center;gap:9px}
.c-lbl{font-size:7.5px;letter-spacing:.1em;color:var(--t2);min-width:94px;flex-shrink:0}
.c-sl{
  flex:1;height:2px;appearance:none;-webkit-appearance:none;
  background:linear-gradient(to right,var(--c) var(--pct,14%),#152535 var(--pct,14%));
  border-radius:1px;cursor:pointer;outline:none;min-width:0
}
.c-sl::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--c);box-shadow:0 0 9px rgba(0,212,232,.9),0 0 0 3px rgba(0,212,232,.2);
  cursor:pointer;transition:box-shadow .2s
}
.c-sl::-webkit-slider-thumb:hover{box-shadow:0 0 14px rgba(0,212,232,1),0 0 0 4px rgba(0,212,232,.3)}
.c-sl::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;border:none;
  background:var(--c);box-shadow:0 0 9px rgba(0,212,232,.9);cursor:pointer
}
.c-val{font-size:10.5px;font-weight:600;color:var(--t1);min-width:34px;text-align:right;flex-shrink:0}
.c-tag{font-size:7px;letter-spacing:.1em;color:var(--t2);min-width:58px;text-align:right;flex-shrink:0}

/* ── METRICS ── */
.t-met{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--bd2)}
.m-card{padding:12px 13px;border-right:1px solid var(--bd2)}
.m-card:last-child{border-right:none}
.m-lbl{font-size:7.5px;letter-spacing:.1em;color:var(--t2);margin-bottom:3px}
.m-val{font-size:clamp(15px,3.9vw,22px);font-weight:700;letter-spacing:-.03em}
.m-val.g{color:var(--g);text-shadow:0 0 16px rgba(0,232,152,.25)}
.m-val.n{color:var(--t1)}
.m-val.r{color:var(--r);text-shadow:0 0 16px rgba(255,64,96,.25)}

/* ── TELEMETRY ── */
.t-tele{
  display:flex;align-items:center;gap:7px;padding:6px 14px;
  background:rgba(0,212,232,.018);border-bottom:1px solid var(--bd2)
}
.t-dot{
  width:6px;height:6px;border-radius:50%;background:var(--c);
  box-shadow:0 0 6px var(--c);flex-shrink:0;animation:bk .72s ease-in-out infinite
}
.t-txt{font-size:8px;letter-spacing:.09em;color:var(--c);font-style:italic;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── CHART ── */
.t-chart{background:var(--bg3);border-bottom:1px solid var(--bd2)}
#chartC{display:block;width:100%;height:192px}

/* ── FOOTER ── */
.t-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 14px;background:rgba(0,212,232,.014)
}
.f-left{display:flex;align-items:center;gap:14px}
.f-tag{
  font-size:7px;letter-spacing:.11em;color:var(--t2);
  padding:2px 6px;border:1px solid var(--bd2);border-radius:2px
}
.f-cnt{font-size:8.5px;letter-spacing:.06em;color:var(--t2)}
.f-ok{
  font-size:8px;font-weight:600;letter-spacing:.12em;color:var(--g);
  padding:2px 8px;border:1px solid rgba(0,232,152,.3);border-radius:2px;
  background:rgba(0,232,152,.04)
}
</style>
</head>
<body>
<div class="wrap">

  <!-- TAGLINE -->
  <div class="tagline">
    <h1>Predict the Chaos. <em>Harvest the Alpha.</em></h1>
  </div>

  <div class="term">

    <!-- HEADER -->
    <div class="t-hdr">
      <div class="t-hl">
        <div class="q-icon">Q</div>
        <div>
          <div class="b-name">QUANT CURVE</div>
          <div class="b-ver">VOL_FIELD_V5</div>
        </div>
      </div>
      <div class="t-hr">
        <div class="t-act">ACTIVE_STRATEGY</div>
        <div class="t-state">STATE: SIMULATING <div class="dot"></div></div>
      </div>
    </div>

    <!-- MESH -->
    <div class="t-mesh">
      <div class="mesh-top">
        <div class="mesh-lbl">
          <div class="eq"><span></span><span></span><span></span></div>
          QUANTUM_VOL_FIELD
        </div>
        <div class="mesh-flux">REALTIME_FLUX <b id="fluxV">23</b></div>
      </div>
      <canvas id="meshC"></canvas>
    </div>

    <!-- CONTROLS -->
    <div class="t-ctrl">
      <div class="c-row">
        <span class="c-lbl">DRIFT_ALPHA</span>
        <input type="range" class="c-sl" id="dsl" min="1" max="99" value="14">
        <span class="c-val" id="dv">0.12</span>
        <span class="c-tag">SIGMA_V →</span>
      </div>
      <div class="c-row">
        <span class="c-lbl">SIGMA_VOL</span>
        <input type="range" class="c-sl" id="ssl" min="1" max="99" value="26">
        <span class="c-val" id="sv">0.28</span>
        <span class="c-tag"></span>
      </div>
    </div>

    <!-- METRICS -->
    <div class="t-met">
      <div class="m-card">
        <div class="m-lbl">ALPHA_RET</div>
        <div class="m-val g" id="m1">+101.53%</div>
      </div>
      <div class="m-card">
        <div class="m-lbl">SHARPE_RATIO</div>
        <div class="m-val n" id="m2">0.77</div>
      </div>
      <div class="m-card">
        <div class="m-lbl">MAX_DRAWDOWN</div>
        <div class="m-val r" id="m3">-23.56%</div>
      </div>
    </div>

    <!-- TELEMETRY -->
    <div class="t-tele">
      <div class="t-dot"></div>
      <span class="t-txt" id="teleT">AWAITING_QUANT_TELEMETRY...</span>
    </div>

    <!-- CHART -->
    <div class="t-chart"><canvas id="chartC"></canvas></div>

    <!-- FOOTER -->
    <div class="t-foot">
      <div class="f-left">
        <span class="f-tag">MEAN_REVERSION_V5</span>
        <span class="f-cnt" id="footC">1223</span>
      </div>
      <span class="f-ok">OK</span>
    </div>

  </div><!-- /.term -->
</div><!-- /.wrap -->

<script>
// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let dA = 0.12, sV = 0.28, meshT = 0;
const N = 500, VIS = 160;
const sRB = new Array(N), bRB = new Array(N);
let bufHead = N - 1, tickAcc = 0;

// ═══════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp   = (a, b, t) => a + (b - a) * t;

// ═══════════════════════════════════════════════════
//  MESH SETUP
// ═══════════════════════════════════════════════════
const mCv  = document.getElementById('meshC');
const mCtx = mCv.getContext('2d');
const MC = 34, MR = 18;

// Pre-allocated Z cache
const ZC = Array.from({length: MR}, () => new Float32Array(MC));

function computeZ() {
  for (let r = 0; r < MR; r++) {
    for (let c = 0; c < MC; c++) {
      const nx = (c / (MC-1)) * 6 - 3;
      const ny = (r / (MR-1)) * 3 - 1.5;
      ZC[r][c] =
        0.75 * Math.sin(1.2*nx  + meshT*(0.55 + dA*0.4))  * Math.cos(0.85*ny + meshT*0.4)  +
        0.35 * Math.sin(2.3*nx  - meshT*0.85)              * Math.cos(1.7*ny  + meshT*(0.45 + sV*0.3)) +
        0.12 * Math.sin(3.1*nx  + meshT*1.3)               * Math.cos(2.8*ny);
    }
  }
}

// Color stops: near-black → dark-teal → bright-cyan
const CSTOP = [[0,2,8],[0,18,38],[0,55,80],[0,110,130],[0,175,185],[0,212,232]];

function mColor(z) {
  const t = clamp((z + 1.3) / 2.6, 0, 1);
  const n = CSTOP.length - 1;
  const i = clamp(Math.floor(t * n), 0, n-1);
  const f = t * n - i;
  const [r1,g1,b1] = CSTOP[i], [r2,g2,b2] = CSTOP[i+1];
  return `rgba(${Math.round(r1+(r2-r1)*f)},${Math.round(g1+(g2-g1)*f)},${Math.round(b1+(b2-b1)*f)},${(0.1+t*0.9).toFixed(2)})`;
}

function mProject(c, r, z) {
  const W = mCv.width, H = mCv.height;
  const xn = c / (MC-1), yn = r / (MR-1);
  const ps = 0.22 + yn * 0.78;
  return {
    x: W*0.5 + (xn - 0.5) * W * 0.92 * ps,
    y: H*0.82 - yn*H*0.56 - z*H*0.16*(0.35 + ps*0.65)
  };
}

function drawMesh() {
  const W = mCv.width, H = mCv.height;

  // Background gradient
  const bg = mCtx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#000208');
  bg.addColorStop(0.5, '#000912');
  bg.addColorStop(1, '#000C18');
  mCtx.fillStyle = bg;
  mCtx.fillRect(0, 0, W, H);

  computeZ();
  mCtx.lineCap = 'round';

  // ── Pass 1: dim lines (no glow) ──────────────────
  mCtx.shadowBlur = 0;
  for (let r = 0; r < MR; r++) {
    for (let c = 0; c < MC; c++) {
      const z = ZC[r][c];
      const p = mProject(c, r, z);

      if (c < MC-1) {
        const za = (z + ZC[r][c+1]) / 2;
        if (za <= 0.3) {
          const p2 = mProject(c+1, r, ZC[r][c+1]);
          mCtx.beginPath(); mCtx.moveTo(p.x, p.y); mCtx.lineTo(p2.x, p2.y);
          mCtx.strokeStyle = mColor(za);
          mCtx.lineWidth = 0.65;
          mCtx.stroke();
        }
      }
      if (r < MR-1) {
        const za = (z + ZC[r+1][c]) / 2;
        if (za <= 0.3) {
          const p2 = mProject(c, r+1, ZC[r+1][c]);
          mCtx.beginPath(); mCtx.moveTo(p.x, p.y); mCtx.lineTo(p2.x, p2.y);
          mCtx.strokeStyle = mColor(za);
          mCtx.lineWidth = 0.65;
          mCtx.stroke();
        }
      }
    }
  }

  // ── Pass 2: glowing peaks ────────────────────────
  mCtx.shadowColor = '#00D4E8';
  mCtx.lineWidth = 1.4;
  for (let r = 0; r < MR; r++) {
    for (let c = 0; c < MC; c++) {
      const z = ZC[r][c];
      const p = mProject(c, r, z);

      if (c < MC-1) {
        const za = (z + ZC[r][c+1]) / 2;
        if (za > 0.3) {
          const p2 = mProject(c+1, r, ZC[r][c+1]);
          mCtx.shadowBlur = za * 20;
          mCtx.beginPath(); mCtx.moveTo(p.x, p.y); mCtx.lineTo(p2.x, p2.y);
          mCtx.strokeStyle = mColor(za);
          mCtx.stroke();
        }
      }
      if (r < MR-1) {
        const za = (z + ZC[r+1][c]) / 2;
        if (za > 0.3) {
          const p2 = mProject(c, r+1, ZC[r+1][c]);
          mCtx.shadowBlur = za * 20;
          mCtx.beginPath(); mCtx.moveTo(p.x, p.y); mCtx.lineTo(p2.x, p2.y);
          mCtx.strokeStyle = mColor(za);
          mCtx.stroke();
        }
      }
    }
  }
  mCtx.shadowBlur = 0;

  // ── Atmospheric fades ───────────────────────────
  const btm = mCtx.createLinearGradient(0, H*0.52, 0, H);
  btm.addColorStop(0, 'rgba(0,8,18,0)');
  btm.addColorStop(1, 'rgba(0,8,18,0.95)');
  mCtx.fillStyle = btm;
  mCtx.fillRect(0, 0, W, H);

  const top = mCtx.createLinearGradient(0, 0, 0, 26);
  top.addColorStop(0, 'rgba(0,8,18,1)');
  top.addColorStop(1, 'rgba(0,8,18,0)');
  mCtx.fillStyle = top;
  mCtx.fillRect(0, 0, W, 26);
}

// ═══════════════════════════════════════════════════
//  CHART DATA (ring buffer, GBM simulation)
// ═══════════════════════════════════════════════════
function initData() {
  let s = 100000, b = 100000;
  for (let i = 0; i < N; i++) {
    const dr = 0.0015 + dA*0.001;
    const vl = 0.012 + sV*0.006;
    s *= 1 + dr + vl * (Math.random()*2 - 1);
    b *= 1 + 0.0003 + 0.005 * (Math.random()*2 - 1);
    sRB[i] = Math.max(s, 1000);
    bRB[i] = Math.max(b, 1000);
  }
  bufHead = N - 1;
}

function tickData() {
  const dr = 0.0009 + dA*0.0007;
  const vl = 0.011 + sV*0.006;
  const ps = sRB[bufHead], pb = bRB[bufHead];
  bufHead = (bufHead + 1) % N;
  sRB[bufHead] = Math.max(ps * (1 + dr + vl*(Math.random()*2 - 1)), 1000);
  bRB[bufHead] = Math.max(pb * (1 + 0.00025 + 0.0045*(Math.random()*2 - 1)), 1000);
}

function getSlice() {
  const strat = [], bench = [];
  for (let i = VIS-1; i >= 0; i--) {
    const idx = (bufHead - i + N) % N;
    strat.push(sRB[idx]);
    bench.push(bRB[idx]);
  }
  return { strat, bench };
}

function fmtP(v) {
  if (v >= 1e6) return `$${(v/1e6).toFixed(2)}M`;
  return `$${(v/1000).toFixed(0)}k`;
}

// ═══════════════════════════════════════════════════
//  CHART DRAW
// ═══════════════════════════════════════════════════
const cCv  = document.getElementById('chartC');
const cCtx = cCv.getContext('2d');

function drawChart() {
  const W = cCv.width, H = cCv.height;
  const PL=6, PR=64, PT=12, PB=18;
  const CW = W-PL-PR, CH = H-PT-PB;

  cCtx.clearRect(0, 0, W, H);
  const cbg = cCtx.createLinearGradient(0, 0, 0, H);
  cbg.addColorStop(0, '#000810');
  cbg.addColorStop(1, '#000610');
  cCtx.fillStyle = cbg;
  cCtx.fillRect(0, 0, W, H);

  const { strat, bench } = getSlice();
  const all = [...strat, ...bench];
  const mn = Math.min(...all) * 0.97;
  const mx = Math.max(...all) * 1.03;
  const rng = mx - mn;
  if (rng < 1) return;

  const tx = i => PL + (i / (VIS-1)) * CW;
  const ty = v => PT + CH - ((v - mn) / rng) * CH;

  // Grid lines + price labels
  for (let gi = 0; gi <= 4; gi++) {
    const gv = mn + (gi/4) * rng;
    const gy = ty(gv);
    cCtx.beginPath(); cCtx.moveTo(PL, gy); cCtx.lineTo(W-PR, gy);
    cCtx.strokeStyle = 'rgba(0,212,232,.05)';
    cCtx.lineWidth = 1;
    cCtx.stroke();
    cCtx.fillStyle = '#486070';
    cCtx.font = '7.5px JetBrains Mono';
    cCtx.textAlign = 'left';
    cCtx.fillText(fmtP(gv), W-PR+5, gy+3);
  }

  // ── Benchmark fill ─────────────────────────────
  cCtx.beginPath();
  cCtx.moveTo(tx(0), H);
  for (let i = 0; i < bench.length; i++) cCtx.lineTo(tx(i), ty(bench[i]));
  cCtx.lineTo(tx(bench.length-1), H);
  cCtx.closePath();
  const bFill = cCtx.createLinearGradient(0, PT, 0, H);
  bFill.addColorStop(0, 'rgba(0,212,232,.10)');
  bFill.addColorStop(1, 'rgba(0,212,232,.01)');
  cCtx.fillStyle = bFill;
  cCtx.fill();

  // ── Benchmark line ─────────────────────────────
  cCtx.beginPath();
  cCtx.moveTo(tx(0), ty(bench[0]));
  for (let i = 1; i < bench.length; i++) cCtx.lineTo(tx(i), ty(bench[i]));
  cCtx.strokeStyle = '#00D4E8';
  cCtx.lineWidth = 1.3;
  cCtx.shadowBlur = 5;
  cCtx.shadowColor = '#00D4E8';
  cCtx.stroke();
  cCtx.shadowBlur = 0;

  // ── Strategy fill ──────────────────────────────
  cCtx.beginPath();
  cCtx.moveTo(tx(0), H);
  for (let i = 0; i < strat.length; i++) cCtx.lineTo(tx(i), ty(strat[i]));
  cCtx.lineTo(tx(strat.length-1), H);
  cCtx.closePath();
  const sFill = cCtx.createLinearGradient(0, PT, 0, H);
  sFill.addColorStop(0, 'rgba(255,32,96,.18)');
  sFill.addColorStop(1, 'rgba(255,32,96,.02)');
  cCtx.fillStyle = sFill;
  cCtx.fill();

  // ── Strategy line ──────────────────────────────
  cCtx.beginPath();
  cCtx.moveTo(tx(0), ty(strat[0]));
  for (let i = 1; i < strat.length; i++) cCtx.lineTo(tx(i), ty(strat[i]));
  cCtx.strokeStyle = '#FF2060';
  cCtx.lineWidth = 2;
  cCtx.shadowBlur = 10;
  cCtx.shadowColor = '#FF2060';
  cCtx.stroke();
  cCtx.shadowBlur = 0;

  // ── Live dot ──────────────────────────────────
  const lsY = ty(strat[strat.length-1]);
  cCtx.beginPath();
  cCtx.arc(tx(strat.length-1), lsY, 3.5, 0, Math.PI*2);
  cCtx.fillStyle = '#FF2060';
  cCtx.shadowBlur = 12;
  cCtx.shadowColor = '#FF2060';
  cCtx.fill();
  cCtx.shadowBlur = 0;

  // ── Annotations ──────────────────────────────
  const bLast = bench[bench.length-1];
  cCtx.fillStyle = 'rgba(72,96,112,.9)';
  cCtx.font = '7.5px JetBrains Mono';
  cCtx.textAlign = 'left';
  cCtx.fillText(`A: ${fmtP(bLast)}`, W-PR+5, ty(bLast)+3);
}

// ═══════════════════════════════════════════════════
//  METRICS
// ═══════════════════════════════════════════════════
function calcMetrics() {
  const { strat } = getSlice();
  if (strat.length < 2) return;
  const s0 = strat[0], sN = strat[strat.length-1];
  const ret = (sN/s0 - 1) * 100;

  const rets = strat.slice(1).map((v, i) => (v - strat[i]) / strat[i]);
  const mu = rets.reduce((a,b) => a+b, 0) / rets.length;
  const std = Math.sqrt(rets.reduce((a,b) => a+(b-mu)**2, 0) / rets.length) || 0.001;
  const sharpe = (mu / std * Math.sqrt(252)).toFixed(2);

  let pk = strat[0], dd = 0;
  for (const v of strat) { if (v > pk) pk = v; const d = (v-pk)/pk; if (d < dd) dd = d; }

  document.getElementById('m1').textContent = (ret >= 0 ? '+' : '') + ret.toFixed(2) + '%';
  document.getElementById('m2').textContent = sharpe;
  document.getElementById('m3').textContent = (dd * 100).toFixed(2) + '%';
}
setInterval(calcMetrics, 2000);

function resizeAll() {

// ═══════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════
function bindSlider(elId, valId, lo, hi, key) {
  const el = document.getElementById(elId);
  // Set initial display
  const initV = lo + (el.value / 99) * (hi - lo);
  document.getElementById(valId).textContent = initV.toFixed(2);
  el.style.setProperty('--pct', ((el.value-1)/98*100).toFixed(1) + '%');

  el.addEventListener('input', function() {
    const v = lo + (this.value / 99) * (hi - lo);
    document.getElementById(valId).textContent = v.toFixed(2);
    this.style.setProperty('--pct', ((this.value-1)/98*100).toFixed(1) + '%');
    if (key === 'dA') dA = v; else sV = v;
    initData();
    calcMetrics();
  });
}

bindSlider('dsl', 'dv', 0.05, 0.55, 'dA');
bindSlider('ssl', 'sv', 0.10, 0.80, 'sV');

// ═══════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════
let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.1);
  lastTs = ts;

  meshT   += dt * 0.55;
  tickAcc += dt * 14;
  while (tickAcc >= 1) { tickData(); tickAcc--; }

  drawMesh();
  drawChart();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
window.addEventListener('resize', resizeAll);
resizeAll();
initData();
calcMetrics();
requestAnimationFrame(loop);
</script>
