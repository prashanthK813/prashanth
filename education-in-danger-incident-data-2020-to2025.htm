            <script nonce="mUKO1hdMUYIYV7QwJCNLMA==" type="application/ld+json">{"@context":"http://schema.org/","@type":"Dataset","name":"Education Under Attack 2020 to2025","description":"# 📘 About Dataset\n\nThis dataset presents verified incidents of violence, threats, and disruptions affecting education systems globally from **January 2020 to May 2025**.\n\nIt includes structured, incident-level records of attacks against students, teachers, schools, and educational infrastructure. The data enables global awareness, humanitarian response, and academic analysis of how education is endangered during conflict and crisis.\n\n---\n\n## 📊 Key Features\n\n| Column | Description |\n|--------|-------------|\n| `Date` | Date of the reported incident |\n| `Country` | Name of the country |\n| `Admin 1` | Region or governorate |\n| `Latitude`, `Longitude` | Geographic coordinates (if available) |\n| `Location of event` | Type of site attacked (e.g., School, University, Transport) |\n| `Reported Perpetrator` | Party responsible (e.g., Military, NSA, Government) |\n| `Students Attacked in School` | Count of students harmed at the location |\n| `Students Killed`, `Injured`, `Kidnapped`, `Arrested` | Specific impacts on students |\n| `Educators Arrested`, `Kidnapped` | Specific impacts on teachers and staff |\n| `Sexual Violence Affecting School Age Children` | Binary indicator (0 or 1) |\n| `SiND Event ID` | Unique event identifier |\n\n---\n\n## 🧠 Use Cases\n\n- Analyze geographic patterns of attacks on education\n- Monitor and visualize global trends by year or region\n- Support policy decisions and advocacy in humanitarian settings\n- Train machine learning models to detect or forecast high-risk zones\n\n---\n\n## 📌 Data Source\n\nThis dataset is aligned with the reporting standards of the **Global Coalition to Protect Education from Attack (GCPEA)** and the **Education Under Attack** initiative. It is based on structured humanitarian reporting and publicly verified inciden
